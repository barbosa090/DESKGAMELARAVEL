services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        image: deskgamelaravel_app
        container_name: deskgamelaravel_app
        restart: unless-stopped
        working_dir: /var/www/html
        volumes:
            - './:/var/www/html'
            - 'vendor:/var/www/html/vendor'
            - 'node_modules:/var/www/html/node_modules'
        ports:
            - '8000:8000'
        environment:
            APP_ENV: local
            APP_DEBUG: 'true'
            APP_URL: 'https://ideal-couscous-97x6xjr5xrgqhpw7v-8000.app.github.dev'
            DB_CONNECTION: mysql
            DB_HOST: mysql
            DB_PORT: 3306
            DB_DATABASE: deskgamelaravel
            DB_USERNAME: sail
            DB_PASSWORD: password
            QUEUE_CONNECTION: database
            SESSION_DRIVER: database
            CACHE_STORE: database
            REDIS_CLIENT: phpredis
            REDIS_HOST: redis
            REDIS_PORT: 6379
        depends_on:
            - redis
            - mysql
        command: 'sh -lc "git config --global --add safe.directory /var/www/html && composer install --no-interaction && php artisan key:generate --ansi && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=8000"'
    redis:
        image: 'redis:7-alpine'
        container_name: deskgamelaravel_redis
        restart: unless-stopped
        ports:
            - '6379:6379'
    mysql:
        image: 'mysql:8.1'
        container_name: deskgamelaravel_mysql
        restart: unless-stopped
        environment:
            MYSQL_ROOT_PASSWORD: password
            MYSQL_DATABASE: deskgamelaravel
            MYSQL_USER: sail
            MYSQL_PASSWORD: password
        ports:
            - '3306:3306'
        volumes:
            - 'mysql_data:/var/lib/mysql'
volumes:
    vendor: null
    node_modules: null
    mysql_data: null
